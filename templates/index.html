<!DOCTYPE html>
<html>
<head>
    <title>Fractal Explorer</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a);
            color: #e2e8f0;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            color: transparent;
            transition: 0.4s;
        }

        h1:hover {
            transform: scale(1.1);
            letter-spacing: 2px;
        }

        form {
            margin-top: 20px;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            width: 220px;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 0 10px #38bdf8;
            transform: scale(1.05);
        }

        button {
            padding: 12px 25px;
            margin-left: 10px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(90deg, #38bdf8, #6366f1);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px #38bdf8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(200, 2px);
            justify-content: center;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(56,189,248,0.2);
            transition: 0.5s;
        }

        .grid:hover {
            transform: scale(1.02);
        }

        .pixel {
            width: 2px;
            height: 2px;
        }

        footer {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.7;
        }

    </style>
</head>

<body>

<h1>🌌 Fractal Explorer</h1>

<form method="POST">
    <input type="number" name="iter" placeholder="Enter Iterations (50-200)" required>
    <button>Generate 🚀</button>
</form>

{% if data %}
<div class="grid">
{% for row in data %}
    {% for val in row %}
        {% set r = val * 5 %}
        {% set g = val * 3 %}
        {% set b = val * 7 %}
        <div class="pixel" style="background-color: rgb({{ r }}, {{ g }}, {{ b }})"></div>
    {% endfor %}
{% endfor %}
</div>
{% endif %}

<footer>
    ✨ Powered by Mathematics & Creativity
</footer>

</body>
</html>
