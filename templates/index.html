<!DOCTYPE html>
<html>
<head>
    <title>Crypto Adventure</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; }
        body { background: var(--bg); color: white; font-family: 'Comic Sans MS', sans-serif; text-align: center; padding: 20px; overflow-x: hidden; }
        
        .level-btn { 
            padding: 15px 30px; border-radius: 50px; border: none; cursor: pointer; 
            font-weight: bold; margin: 10px; transition: 0.3s; font-size: 1.1rem;
            box-shadow: 0 5px 0 #000;
        }
        .level-btn:active { transform: translateY(5px); box-shadow: none; }
        .easy { background: #22c55e; } .medium { background: #eab308; } .hard { background: #ef4444; }

        .game-card { 
            background: var(--card); padding: 40px; border-radius: 30px; 
            margin: 20px auto; max-width: 650px; display: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 4px solid var(--primary);
        }
        .active { display: block; }
        .code-box { background: #020617; padding: 20px; border-radius: 15px; color: #22c55e; font-family: monospace; font-size: 1.3rem; margin: 20px 0; border: 2px dashed var(--primary); }
    </style>
</head>
<body>

    <h1 class="animate__animated animate__bounceIn">🍬 Crypto Adventure! 🍭</h1>
    <p>Type a message and pick a level to start the journey!</p>
    
    <form method="POST" class="animate__animated animate__fadeIn">
        <input type="text" name="message" placeholder="Type your secret here..." required 
               style="padding:15px; border-radius:25px; width:80%; border:none; margin-bottom: 20px; font-size: 1.2rem; text-align: center;">
        <br>
        <button type="submit" name="level" value="easy" class="level-btn easy">Level 1: Easy</button>
        <button type="submit" name="level" value="medium" class="level-btn medium">Level 2: Medium</button>
        <button type="submit" name="level" value="hard" class="level-btn hard">Level 3: Hard</button>
    </form>

    {% if data and data.steps %}
    <div id="game-flow" style="margin-top: 40px;">
        {% for step in data.steps %}
        <div id="step-{{ loop.index }}" class="game-card {% if loop.first %}active animate__animated animate__backInDown{% endif %}">
            <h2 style="color: var(--primary);">{{ step.t }}</h2>
            <p style="font-size: 1.3rem;">{{ step.d }}</p>
            
            {% if loop.last %}
                <div class="code-box">{{ data.res }}</div>
                <a href="/" class="level-btn" style="background: #64748b; text-decoration: none; display: inline-block;">Play Again! 🔄</a>
            {% else %}
                <button class="level-btn" style="background: var(--primary);" onclick="nextStep({{ loop.index }})">Next Level ➡️</button>
            {% endif %}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <script>
        function nextStep(current) {
            const currentEl = document.getElementById('step-' + current);
            const nextEl = document.getElementById('step-' + (current + 1));
            
            currentEl.classList.remove('active');
            nextEl.classList.add('active');
            nextEl.classList.add('animate__backInRight');
        }
    </script>
</body>
</html>
